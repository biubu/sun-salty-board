<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy
      ─────────────────────────────────────────────────────────────────────
      * Dev policy (what you see here): needs 'unsafe-eval' and
        ws://localhost:* http://localhost:* connect-src because Vite's
        HMR client runs ESM with eval + WebSocket reloads.
      * Production policy: vite.config.ts' `csp-prod` plugin strips
        those relaxations so the shipped bundle only allows 'self'
        scripts and connection targets.
      * style-src 'unsafe-inline' — inline style attributes are set by
        react-window's FixedSizeList rows for absolute positioning.
      * img-src includes blob: to allow the in-memory image previews
        produced via URL.createObjectURL.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws://localhost:* http://localhost:*"
    />
    <title>SunSaltyBoard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
