name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            build-command: build:linux
            asset-pattern: sunsaltyboard-*.AppImage
            artifact-name: sunsaltyboard-linux
          - os: macos-latest
            build-command: build:mac
            asset-pattern: sunsaltyboard-*.dmg
            artifact-name: sunsaltyboard-macos
          - os: windows-latest
            build-command: build:win
            asset-pattern: sunsaltyboard-setup-*.exe
            artifact-name: sunsaltyboard-windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Sync version from git tag
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME#v}
          npm version "$TAG" --no-git-tag-version --allow-same-version

      # better-sqlite3 ships a prebuilt binary per Node ABI. The host Node
      # (used by `typecheck` / `test:run`) and Electron's bundled Node (used
      # at runtime) require different ABIs, so cache the host build and
      # rebuild against Electron after `npm ci`.
      - name: Cache better-sqlite3 native build
        uses: actions/cache@v4
        with:
          path: |
            node_modules/better-sqlite3/build
            node_modules/better-sqlite3/lib/binding
          key: ${{ runner.os }}-bsql-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-bsql-

      - name: Install dependencies
        run: npm ci

      # Tests run on the host Node 22 (NODE_MODULE_VERSION 127). After the
      # Electron rebuild below flips better-sqlite3 to ABI 148, the test step
      # would fail with ERR_DLOPEN_FAILED — so rebuild back to the host ABI
      # before running tests, then rebuild again for Electron before the
      # actual packaging step.
      - name: Rebuild native modules for tests (host Node ABI)
        run: npm rebuild better-sqlite3

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ${{ matrix.build-command }} -- --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: release/
          if-no-files-found: ignore
