name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            build-command: build:linux
            asset-pattern: sunsaltyboard-*.AppImage
            artifact-name: sunsaltyboard-linux
          - os: macos-latest
            build-command: build:mac
            asset-pattern: sunsaltyboard-*.dmg
            artifact-name: sunsaltyboard-macos
          - os: windows-latest
            build-command: build:win
            asset-pattern: sunsaltyboard-setup-*.exe
            artifact-name: sunsaltyboard-windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Sync version from git tag
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME#v}
          npm version "$TAG" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ${{ matrix.build-command }} -- --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: release/
          if-no-files-found: ignore
