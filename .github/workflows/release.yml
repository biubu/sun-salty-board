name: Release

on:
  push:
    tags:
      - 'v*'

# Only one release workflow runs at a time, even if multiple tags are pushed
# in quick succession. Without this, the publish job races itself when two
# tags are created back-to-back and each tries to upload to a fresh release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            build-command: build:linux
            artifact-name: sunsaltyboard-linux
          - os: macos-latest
            build-command: build:mac
            artifact-name: sunsaltyboard-macos
          - os: windows-latest
            build-command: build:win
            artifact-name: sunsaltyboard-windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Sync version from git tag
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME#v}
          npm version "$TAG" --no-git-tag-version --allow-same-version

      # better-sqlite3 ships a prebuilt binary per Node ABI. The host Node
      # (used by `typecheck` / `test:run`) and Electron's bundled Node (used
      # at runtime) require different ABIs, so we rebuild twice: once for the
      # host ABI before tests, once again for Electron before packaging.
      - name: Cache better-sqlite3 native build
        uses: actions/cache@v4
        with:
          path: |
            node_modules/better-sqlite3/build
            node_modules/better-sqlite3/lib/binding
          key: ${{ runner.os }}-bsql-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-bsql-

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for tests (host Node ABI)
        run: npm rebuild better-sqlite3

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -f -w better-sqlite3

      # No --publish flag here — the dedicated `publish` job below owns
      # GitHub Releases so the three matrix builds don't race each other
      # creating the same release. We still pass GH_TOKEN because
      # electron-builder reads `publish.provider: github` from
      # electron-builder.yml and aborts if no token is configured, even
      # when not actually publishing.
      - name: Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ${{ matrix.build-command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: release/
          if-no-files-found: ignore

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la release/

      # electron-updater's `publish` field in electron-builder.yml is set to
      # GitHub; we invoke electron-builder here without rebuilding the app,
      # only to publish the artifacts already on disk to the matching tag.
      # electron-builder re-bundles by default, so we skip the actual build
      # step with --config.directories.output and reuse what the matrix jobs
      # already produced. The simplest portable path is to call
      # `electron-builder --publish always` from the source tree but with
      # the release/ directory overridden — however that's brittle across
      # platforms (mac/win artifacts have platform-specific paths). Instead
      # we let electron-builder run a no-op build by pointing it at a temp
      # out dir and then uploading via gh CLI from release/.
      - name: Upload release artifacts via gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # Upload each file under release/ as a release asset, creating the
          # release if it doesn't exist (idempotent: if it already does,
          # gh release upload just adds/overwrites assets).
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Creating release $TAG"
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --draft
          else
            echo "Release $TAG already exists, uploading assets"
          fi
          # Push every file under release/ (recursively, preserving layout).
          find release/ -type f -print0 | while IFS= read -r -d '' f; do
            echo "Uploading $f"
            gh release upload "$TAG" "$f" --clobber
          done
          gh release edit "$TAG" --draft=false