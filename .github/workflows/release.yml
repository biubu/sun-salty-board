name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: sunsaltyboard-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: sunsaltyboard-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: sunsaltyboard-windows-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Sync version from git tag
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME#v}
          npm version "$TAG" --no-git-tag-version --allow-same-version
          sed -i.bak "s/^version = .*/version = \"$TAG\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libxdo-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ''
          releaseDraft: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact-name }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: ignore
