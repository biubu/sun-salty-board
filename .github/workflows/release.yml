name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            build-command: build:linux
            asset-name: SunSaltyBoard-*-x86_64.AppImage
          - os: macos-latest
            build-command: build:mac
            asset-name: SunSaltyBoard-*-x64.dmg
          - os: windows-latest
            build-command: build:win
            asset-name: SunSaltyBoard-setup-*.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ${{ matrix.build-command }} -- --publish always

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset-name }}
          path: release/${{ matrix.asset-name }}
          if-no-files-found: warn
