appId: com.sunsaltyboard.app
productName: SunSaltyBoard
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - dist-electron/**/*
  - resources/**/*
  - package.json
# electron-builder 26 ships an asar by default; native binary assets read
# through `nativeImage.createFromPath` at runtime need to live outside the
# archive or Electron's asar shim will refuse to mmap them. resources/**
# holds the macOS template tray icon and the platform app icons.
asarUnpack:
  - resources/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${name}-setup-${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    # electron-updater's MacUpdater only consumes .zip payloads (it pipes
    # them through a local proxy to the bundled Squirrel.Mac for differential
    # updates). Without a zip artifact, checkForUpdates throws
    # ERR_UPDATER_ZIP_FILE_NOT_FOUND at runtime — even when a matching dmg
    # exists in the same release. Keep dmg for manual installs, ship zip
    # alongside so auto-update has something to feed Squirrel.
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: ${name}-${version}-${arch}.${ext}
  category: public.app-category.utilities
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
  icon: resources/icon.png
publish:
  provider: github
  owner: biubu
  repo: sun-salty-board
  releaseType: release
extraMetadata:
  main: dist-electron/main.js
