appId: com.sunsaltyboard.app
productName: SunSaltyBoard
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - dist-electron/**/*
  - resources/**/*
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${name}-setup-${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${name}-${version}-${arch}.${ext}
  category: public.app-category.utilities
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
  icon: resources/icon.png
publish:
  provider: github
  owner: biubu
  repo: sun-salty-board
  releaseType: release
extraMetadata:
  main: dist-electron/main.js
