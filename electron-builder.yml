appId: com.sunsaltyboard.app
productName: SunSaltyBoard
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - dist-electron/**/*
  - resources/**/*
  - package.json
  # better-sqlite3 ships with sqlite3 source (deps/), C++ sources (src/),
  # a CLI tool (bin/) and prebuilt-object intermediates (build/Release/obj/).
  # Only the prebuilt native binding is needed at runtime; everything else
  # bloats the asar by ~22 MB.
  - node_modules/better-sqlite3/build/Release/better_sqlite3.node
  - node_modules/better-sqlite3/build/Release/*.dylib
  - node_modules/better-sqlite3/lib/**/*
  - node_modules/better-sqlite3/package.json
# electron-builder 26 ships an asar by default; native binary assets read
# through `nativeImage.createFromPath` or required as a Node native module
# at runtime need to live outside the archive or Electron's asar shim will
# refuse to mmap them. resources/** holds the macOS template tray icon and
# the platform app icons. better_sqlite3.node is the native binding for
# better-sqlite3 and must be loadable by Node's module loader.
asarUnpack:
  - resources/**/*
  - node_modules/better-sqlite3/build/Release/better_sqlite3.node
  - node_modules/better-sqlite3/build/Release/*.dylib
# Trim Electron Framework down to the essentials after packaging: drop the
# SwiftShader software-Vulkan fallback (Macs have GPUs), the bundled ffmpeg
# (we never play video in a clipboard manager) and Chromium's localised UI
# resources for every locale except English and Simplified Chinese. See
# scripts/after-pack.js for the implementation.
afterPack: scripts/after-pack.js
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${name}-setup-${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    # electron-updater's MacUpdater only consumes .zip payloads (it pipes
    # them through a local proxy to the bundled Squirrel.Mac for differential
    # updates). Without a zip artifact, checkForUpdates throws
    # ERR_UPDATER_ZIP_FILE_NOT_FOUND at runtime — even when a matching dmg
    # exists in the same release. Keep dmg for manual installs, ship zip
    # alongside so auto-update has something to feed Squirrel.
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: ${name}-${version}-${arch}.${ext}
  category: public.app-category.utilities
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
  icon: resources/icon.png
publish:
  provider: github
  owner: biubu
  repo: sun-salty-board
  releaseType: release
extraMetadata:
  main: dist-electron/main.js
